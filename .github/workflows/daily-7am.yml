name: Daily Job Apply - 4 Hours

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:

jobs:
  apply-jobs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium
          
      - name: Inject Configuration (conf.py)
        run: |
          echo "${{ secrets.CONF_PY }}" > src/conf.py
          
      - name: Run Job Application Bot
        env:
          HEADLESS: "True"
        run: python src/main.py
          
      - name: Upload Artifacts (Safety Backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-results-${{ github.run_number }}
          path: |
            data/
            logs/
          retention-days: 14
          
      - name: Commit State Back to Repo
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "Auto: Bot run stats - $(date -u)" || true
          git push || true
