name: Daily Job Apply - 7 AM

on:
  schedule:
    - cron: '0 7 * * 1-5'  # Mon-Fri at 7 AM UTC
    - cron: '0 7 * * 0,6'  # Sat-Sun at 7 AM UTC
  workflow_dispatch:

jobs:
  apply-jobs:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - run: |
          pip install -r requirements.txt
          playwright install firefox
      
      - run: python3 apply_jobs_v2.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
      
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: bot-results-${{ github.run_number }}
          path: |
            qa_master.json
            companies_applied.json
            application_log.json
            application_stats.json
          retention-days: 90
      
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Auto: Bot run - $(date -u)" || true
          git push || true
        if: always()
